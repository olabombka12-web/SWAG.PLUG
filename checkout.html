<script>
    // 1. Ładowanie danych z koszyka
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;
    const summary = document.getElementById('cartSummary');

    // Wyświetlanie podsumowania (TEGO BRAKOWAŁO)
    if (cart.length === 0) {
        summary.innerHTML = '<p>Twój koszyk jest pusty!</p>';
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    } else {
        summary.innerHTML = '';
        cart.forEach(item => {
            total += item.price * item.quantity;
            summary.innerHTML += `<p>${item.name} (${item.size}) x${item.quantity} - <b>${(item.price * item.quantity).toFixed(2)} zł</b></p>`;
        });
        summary.innerHTML += `<p style="font-size: 1.2em;"><strong>Razem: ${total.toFixed(2)} zł</strong></p>`;
    }

    // 2. Funkcja przejścia do płatności
    function saveShipping() {
        const fields = ['firstName', 'lastName', 'phone', 'address', 'postalCode', 'city', 'country'];
        const shipping = {};
        let valid = true;

        fields.forEach(id => {
            const el = document.getElementById(id);
            const val = el ? el.value.trim() : "";
            if (!val) valid = false;
            shipping[id] = val;
        });

        if (!valid) {
            alert("Wypełnij wszystkie pola wysyłki!");
            return;
        }

        localStorage.setItem('shipping', JSON.stringify(shipping));
        
        // Przełączanie widoku
        document.getElementById('stepShipping').style.display = 'none';
        document.getElementById('stepPayment').style.display = 'block';
    }

    function backToShipping() {
        document.getElementById('stepPayment').style.display = 'none';
        document.getElementById('stepShipping').style.display = 'block';
    }

    // 3. Wybór formy płatności
    function showPayPal() {
        document.getElementById('paypalForm').style.display = 'block';
        document.getElementById('cardForm').style.display = 'none';
    }

    function showCard() {
        document.getElementById('cardForm').style.display = 'block';
        document.getElementById('paypalForm').style.display = 'none';
    }

    // 4. Finalizacja i wysyłka do SERVER.JS
    function completeOrder(method) {
        const shipping = JSON.parse(localStorage.getItem('shipping'));
        
        const finalOrder = {
            customer: shipping,
            items: cart,
            total: total,
            paymentMethod: method,
            date: new Date().toISOString()
        };

        fetch('/save-shipping', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(finalOrder)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'OK') {
                alert("Dziękujemy! Zamówienie zostało zapisane.");
                localStorage.clear();
                window.location.href = 'index.html';
            } else {
                alert("Błąd serwera przy zapisie.");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Błąd połączenia z serwerem Render.");
        });
    }
</script>
