<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SWAG.PLUG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: 50px auto; padding: 20px; background: #000; color: #fff; border: 1px solid #333; font-family: sans-serif; }
        .step { display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #ccc; }
        button.back { background: #333; color: #ccc; margin-top: 5px; }
        #summary p { border-bottom: 1px solid #222; padding: 5px 0; margin: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2 style="letter-spacing: 2px; border-bottom: 2px solid #fff; padding-bottom: 10px;">ZAMÓWIENIE</h2>
    
    <!-- Podsumowanie koszyka -->
    <div id="summary" style="margin-bottom: 30px;"></div>

    <!-- KROK 1: WYSYŁKA -->
    <div id="step1" class="step active">
        <h3 style="color: #888;">[01] DANE WYSYŁKI</h3>
        <input type="text" id="fName" placeholder="Imię i Nazwisko">
        <input type="text" id="addr" placeholder="Ulica i numer domu">
        <input type="text" id="city" placeholder="Kod pocztowy i miasto">
        <input type="tel" id="phone" placeholder="Numer telefonu">
        <button onclick="nextStep()">DALEJ: PŁATNOŚĆ</button>
    </div>

    <!-- KROK 2: PŁATNOŚĆ -->
    <div id="step2" class="step">
        <h3 style="color: #888;">[02] WYBIERZ METODĘ PŁATNOŚCI</h3>
        
        <button type="button" onclick="pokazPolaKarty()" style="background: #111; color: #fff; border: 1px solid #444;">KARTA PŁATNICZA</button>
        
        <div id="formularzKarty" style="display:none; margin: 15px 0; padding: 15px; border: 1px dashed #444; background: #050505;">
            <input type="text" id="cardNumber" placeholder="Numer karty (16 cyfr)" maxlength="16">
            <div style="display:flex; gap:10px;">
                <input type="text" id="cardExp" placeholder="MM/RR" maxlength="5">
                <input type="text" id="cardCvv" placeholder="CVV" maxlength="3">
            </div>
            <button onclick="finish('Karta')" style="background: #fff; color: #000;">ZAPŁAĆ TERAZ</button>
        </div>

        <button onclick="finish('PayPal')" style="background: #111; color: #fff; border: 1px solid #444; margin-top: 10px;">PAYPAL</button>
        <button class="back" onclick="prevStep()">POWRÓT</button>
    </div>
</div>

<script>
    // Pobieranie danych z koszyka (localStorage)
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;

    // Funkcja wyświetlająca produkty i sumę
    const renderSummary = () => {
        const summary = document.getElementById('summary');
        if(cart.length === 0) {
            summary.innerHTML = "<p style='text-align:center;'>Koszyk jest pusty!</p>";
            return;
        }
        summary.innerHTML = "";
        let currentTotal = 0;
        cart.forEach(i => {
            currentTotal += i.price * i.quantity;
            summary.innerHTML += `<p><span>${i.name} (${i.size}) x${i.quantity}</span> <b>${(i.price * i.quantity).toFixed(2)} zł</b></p>`;
        });
        total = currentTotal;
        summary.innerHTML += `<p style="font-size: 1.2em; border-top: 1px solid #fff; margin-top: 10px; padding-top: 10px;"><span>SUMA:</span> <b>${total.toFixed(2)} zł</b></p>`;
    };
    renderSummary();

    function nextStep() {
        const name = document.getElementById('fName').value;
        const addr = document.getElementById('addr').value;
        if(!name || !addr) return alert("Proszę wypełnić dane wysyłki!");
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function prevStep() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    function pokazPolaKarty() {
        document.getElementById('formularzKarty').style.display = 'block';
    }

    function finish(method) {
        // Budujemy obiekt zamówienia dla Twojego server.js
        const order = {
            customer: {
                name: document.getElementById('fName').value,
                addr: document.getElementById('addr').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value
            },
            items: cart,
            total: total,
            payment: { 
                method: method,
                card: method === 'Karta' ? document.getElementById('cardNumber').value : "N/A"
            }
        };

        // Wysyłka do Node.js
        fetch('/save-shipping', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(order)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'OK') {
                // KOMUNIKAT O UKOŃCZENIU ZAMÓWIENIA
                alert("ZAMÓWIENIE UKOŃCZONE! Potwierdzenie zostało wysłane na Twój e-mail.");
                localStorage.clear();
                window.location.href = "index.html";
            } else {
                alert("Błąd serwera: " + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert("Błąd połączenia. Upewnij się, że serwer Node.js jest uruchomiony.");
        });
    }
</script>
</body>
</html>
