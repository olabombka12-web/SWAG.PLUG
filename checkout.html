<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Checkout - SWAG.PLUG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: 50px auto; padding: 20px; background: #000; color: #fff; border: 1px solid #333; }
        .step { display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.back { background: #333; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>PODSUMOWANIE</h2>
    <div id="summary" style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;"></div>

    <!-- KROK 1: WYSYŁKA -->
    <div id="step1" class="step active">
        <h3>DANE WYSYŁKI</h3>
        <input type="text" id="fName" placeholder="Imię i Nazwisko">
        <input type="text" id="addr" placeholder="Adres i nr domu">
        <input type="text" id="city" placeholder="Kod pocztowy i miasto">
        <input type="tel" id="phone" placeholder="Telefon">
        <button onclick="nextStep()">DALEJ: PŁATNOŚĆ</button>
    </div>

    <!-- KROK 2: PŁATNOŚĆ -->
    <div id="step2" class="step">
        <h3>WYBIERZ METODĘ PŁATNOŚCI</h3>
        
        <button type="button" onclick="pokazPolaKarty()" style="background: #222; color: #fff; border: 1px solid #444;">KARTA PŁATNICZA</button>
        
        <div id="formularzKarty" style="display:none; margin: 15px 0; padding: 15px; border: 1px dashed #444;">
            <input type="text" id="cardNumber" placeholder="Numer karty (16 cyfr)" maxlength="16">
            <div style="display:flex; gap:10px;">
                <input type="text" id="cardExp" placeholder="MM/RR" maxlength="5">
                <input type="text" id="cardCvv" placeholder="CVV" maxlength="3">
            </div>
            <button onclick="finish('Karta')" style="background: #fff; color: #000;">ZAPŁAĆ KARTĄ</button>
        </div>

        <button onclick="finish('PayPal')" style="background: #222; color: #fff; border: 1px solid #444; margin-top: 10px;">PAYPAL</button>
        <button class="back" onclick="prevStep()">POWRÓT</button>
    </div>
</div>

<script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const sumDiv = document.getElementById('summary');
    let total = 0;

    if(cart.length === 0) {
        sumDiv.innerHTML = "Koszyk jest pusty!";
        setTimeout(() => window.location.href="index.html", 2000);
    } else {
        cart.forEach(i => {
            total += i.price * i.quantity;
            sumDiv.innerHTML += `<p>${i.name} (${i.size}) x${i.quantity} - ${(i.price*i.quantity).toFixed(2)} zł</p>`;
        });
        sumDiv.innerHTML += `<b>RAZEM: ${total.toFixed(2)} zł</b>`;
    }

    function nextStep() {
        if(!document.getElementById('fName').value) return alert("Wypełnij dane!");
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function prevStep() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    function pokazPolaKarty() {
        document.getElementById('formularzKarty').style.display = 'block';
    }

    function finish(method) {
        const customerData = { 
            name: document.getElementById('fName').value, 
            addr: document.getElementById('addr').value,
            city: document.getElementById('city').value,
            phone: document.getElementById('phone').value
        };

        let paymentInfo = { method: method };

        if(method === 'Karta') {
            const num = document.getElementById('cardNumber').value;
            const exp = document.getElementById('cardExp').value;
            const cvv = document.getElementById('cardCvv').value;
            if(!num || !exp || !cvv) return alert("Wypełnij dane karty!");
            paymentInfo.card = { number: num, expiry: exp, cvv: cvv };
        }

        const order = {
            customer: customerData,
            items: cart,
            total: total,
            payment: paymentInfo,
            date: new Date().toISOString()
        };

        fetch('/save-shipping', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(order)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'OK') {
                alert("ZAMÓWIENIE ZŁOŻONE POMYŚLNIE!");
                localStorage.clear();
                window.location.href = "index.html";
            }
        })
        .catch(err => alert("Błąd połączenia z serwerem."));
    }
</script>
</body>
</html>
