<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SWAG.PLUG</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- POPRAWIONY SKRYPT PAYPAL Z TWOIM ID -->
   <script src="https://www.paypal.com/sdk/js?client-id=Aad0ANidmfR4OAsOrNLxLI0mGMPun-rxprz_EFCU1rT4Ok8tkYbjKgu49eWY1gYyFSmNILgrBLfMqkyw&components=card-fields"></script>

    <style>
        .checkout-container { max-width: 600px; margin: 50px auto; padding: 20px; background: #000; color: #fff; border: 1px solid #333; font-family: sans-serif; }
        .step { display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #ccc; }
        button.back { background: #333; color: #ccc; margin-top: 5px; }
        #summary p { border-bottom: 1px solid #222; padding: 5px 0; margin: 5px 0; display: flex; justify-content: space-between; }
        #paypal-button-container { margin-top: 20px; min-height: 150px; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2 style="letter-spacing: 2px; border-bottom: 2px solid #fff; padding-bottom: 10px;">ZAMÓWIENIE</h2>
    <div id="summary" style="margin-bottom: 30px;"></div>

    <div id="step1" class="step active">
        <h3 style="color: #888;">[01] DANE WYSYŁKI</h3>
        <input type="text" id="fName" placeholder="Imię i Nazwisko">
        <input type="text" id="addr" placeholder="Ulica i numer domu">
        <input type="text" id="city" placeholder="Kod pocztowy i miasto">
        <input type="tel" id="phone" placeholder="Numer telefonu">
        <button onclick="nextStep()">DALEJ: PŁATNOŚĆ</button>
    </div>

    <div id="step2" class="step">
        <h3 style="color: #888;">[02] DOKOŃCZ PŁATNOŚĆ</h3>
        <p style="font-size: 0.9em; color: #ccc; margin-bottom: 15px;">Wybierz metodę płatności poniżej:</p>
        
        <!-- Tu PayPal automatycznie wstawi przyciski -->
        <div id="paypal-button-container"></div>

        <button class="back" onclick="prevStep()">POWRÓT DO DANYCH</button>
    </div>
</div>

<script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;

    const renderSummary = () => {
        const summary = document.getElementById('summary');
        if(cart.length === 0) {
            summary.innerHTML = "<p style='text-align:center;'>Koszyk jest pusty!</p>";
            return;
        }
        summary.innerHTML = "";
        let currentTotal = 0;
        cart.forEach(i => {
            currentTotal += i.price * i.quantity;
            summary.innerHTML += `<p><span>${i.name} (${i.size}) x${i.quantity}</span> <b>${(i.price * i.quantity).toFixed(2)} zł</b></p>`;
        });
        total = currentTotal;
        summary.innerHTML += `<p style="font-size: 1.2em; border-top: 1px solid #fff; margin-top: 10px; padding-top: 10px;"><span>SUMA:</span> <b>${total.toFixed(2)} zł</b></p>`;
    };
    renderSummary();

    function nextStep() {
        if(!document.getElementById('fName').value || !document.getElementById('addr').value) {
            return alert("Wypełnij dane wysyłki!");
        }
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function prevStep() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    // KONFIGURACJA PRZYCISKÓW PAYPAL
    if (window.paypal) {
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: total.toFixed(2)
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    const orderData = {
                        Klient: document.getElementById('fName').value,
                        Adres: document.getElementById('addr').value + ", " + document.getElementById('city').value,
                        Telefon: document.getElementById('phone').value,
                        Produkty: cart.map(i => `${i.name} (${i.size}) x${i.quantity}`).join(", "),
                        Suma: total.toFixed(2) + " PLN",
                        Status: "ZAPŁACONO",
                        PayPal_ID: details.id
                    };

                    fetch('https://formspree.io/f/mzdkopjg', { 
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(orderData)
                    })
                    .then(() => {
                        alert("ZAMÓWIENIE UKOŃCZONE! Płatność otrzymana.");
                        localStorage.clear();
                        window.location.href = "index.html";
                    });
                });
            },
            onError: function(err) {
                alert("Błąd płatności. Upewnij się, że Twoje konto PayPal Live jest aktywne.");
                console.error(err);
            }
        }).render('#paypal-button-container');
    } else {
        console.error("Błąd: Skrypt PayPal nie został załadowany. Sprawdź Client ID.");
    }
</script>
</body>
</html>
