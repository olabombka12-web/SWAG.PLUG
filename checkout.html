<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Checkout - SWAG.PLUG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: 50px auto; padding: 20px; background: #000; color: #fff; border: 1px solid #333; }
        .step { display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.back { background: #333; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>PODSUMOWANIE</h2>
    <div id="summary" style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;"></div>

    <!-- KROK 1 -->
    <div id="step1" class="step active">
        <h3>DANE WYSYŁKI</h3>
        <input type="text" id="fName" placeholder="Imię i Nazwisko">
        <input type="text" id="addr" placeholder="Adres i nr domu">
        <input type="text" id="city" placeholder="Kod pocztowy i miasto">
        <input type="tel" id="phone" placeholder="Telefon">
        <button onclick="nextStep()">DALEJ: PŁATNOŚĆ</button>
    </div>

    <!-- KROK 2 -->
    <div id="step2" class="step">
        <h3>PŁATNOŚĆ</h3>
        <button onclick="finish('Karta')">KARTA PŁATNICZA</button>
        <button onclick="finish('PayPal')">PAYPAL</button>
        <button class="back" onclick="prevStep()">POWRÓT</button>
    </div>
</div>

<script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const sumDiv = document.getElementById('summary');
    let total = 0;

    if(cart.length === 0) {
        sumDiv.innerHTML = "Koszyk jest pusty!";
        setTimeout(() => window.location.href="index.html", 2000);
    } else {
        cart.forEach(i => {
            total += i.price * i.quantity;
            sumDiv.innerHTML += `<p>${i.name} (${i.size}) x${i.quantity} - ${(i.price*i.quantity).toFixed(2)} zł</p>`;
        });
        sumDiv.innerHTML += `<b>RAZEM: ${total.toFixed(2)} zł</b>`;
    }

    function nextStep() {
        if(!document.getElementById('fName').value) return alert("Wypełnij dane!");
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function prevStep() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    function finish(method) {
        const order = {
            customer: { name: document.getElementById('fName').value, addr: document.getElementById('addr').value },
            items: cart,
            total: total,
            method: method
        };

        fetch('/save-shipping', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(order)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'OK') {
                alert("ZAMÓWIENIE ZŁOŻONE!");
                localStorage.clear();
                window.location.href = "index.html";
            }
        });
    }
</script>
</body>
</html>
