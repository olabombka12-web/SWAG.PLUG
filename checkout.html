<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - SWAG.PLUG</title>

<script src="https://www.paypal.com/sdk/js?client-id=Aad0ANidmfR4OAsOrNLxLI0mGMPun-rxprz_EFCU1rT4Ok8tkYbjKgu49eWY1gYyFSmNILgrBLfMqkyw&components=YOUR_COMPONENTS"></script>
    

<style>
body { background:#000; color:#fff; font-family:sans-serif; }

.checkout {
    max-width:600px;
    margin:50px auto;
    padding:20px;
    border:1px solid #333;
}

.step { display:none; }
.step.active { display:block; }

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#111;
    border:1px solid #444;
    color:#fff;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#fff;
    color:#000;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button.back {
    background:#333;
    color:#ccc;
}

#summary p {
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #222;
    padding:5px 0;
}
</style>
</head>

<body>

<div class="checkout">

<h2>ZAMÓWIENIE</h2>

<div id="summary"></div>

<!-- STEP 1 -->
<div id="step1" class="step active">
    <h3>DANE WYSYŁKI</h3>
    <input id="name" placeholder="Imię i nazwisko">
    <input id="addr" placeholder="Adres">
    <input id="city" placeholder="Kod + miasto">
    <input id="phone" placeholder="Telefon">
    <button onclick="goToPayment()">DALEJ</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
    <h3>PŁATNOŚĆ</h3>

    <div id="paypal-button-container"></div>

    <button class="back" onclick="back()">POWRÓT</button>
</div>

</div>

<script>
const cart = JSON.parse(localStorage.getItem('cart')) || [];
let total = 0;

// PODSUMOWANIE
function renderSummary(){
    const el = document.getElementById('summary');

    if(cart.length === 0){
        el.innerHTML = "<p>Koszyk pusty</p>";
        return;
    }

    el.innerHTML = "";
    total = 0;

    cart.forEach(p=>{
        const sum = p.price * p.quantity;
        total += sum;

        el.innerHTML += `
        <p>
            <span>${p.name} (${p.size}) x${p.quantity}</span>
            <b>${sum.toFixed(2)} zł</b>
        </p>`;
    });

    el.innerHTML += `
    <p style="font-size:1.2em;">
        <span>SUMA</span>
        <b>${total.toFixed(2)} zł</b>
    </p>`;
}

renderSummary();

// NAV
function goToPayment(){
    if(!name.value || !addr.value || !city.value){
        alert("Wypełnij dane");
        return;
    }

    step1.classList.remove('active');
    step2.classList.add('active');
}

function back(){
    step2.classList.remove('active');
    step1.classList.add('active');
}

// FINALIZACJA
function finish(){
    const data = {
        klient: name.value,
        adres: addr.value + ", " + city.value,
        telefon: phone.value,
        produkty: cart.map(p => `${p.name} x${p.quantity}`).join(", "),
        suma: total.toFixed(2)
    };

    fetch("https://formspree.io/f/mzdkopjg", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(data)
    })
    .then(()=>{
        alert("Zamówienie złożone!");
        localStorage.clear();
        window.location.href="index.html";
    })
    .catch(()=>{
        alert("Błąd wysyłki");
    });
}

// PAYPAL
paypal.Buttons({

    createOrder: (data, actions) => {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: total.toFixed(2)
                }
            }]
        });
    },

    onApprove: (data, actions) => {
        return actions.order.capture().then(() => {
            finish();
        });
    }

}).render('#paypal-button-container');
</script>

</body>
</html>
